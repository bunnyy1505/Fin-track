# Spring Application Config
spring.application.name=fintrack

# Active Profile - 'h2' for local embedded database, 'mysql' for external MySQL database.
# Default to h2 so it runs immediately on clone/download.
spring.profiles.active=h2

# Server Port
server.port=8080

# ----------------- JWT Settings -----------------
fintrack.jwt.secret=9a62827725964f43ef744577884d63cd088484a0d9e8df457ee45f78bdfad2ad6e545802
fintrack.jwt.expirationMs=3600000
fintrack.jwt.refreshExpirationMs=86400000

# ----------------- Swagger/OpenAPI Settings -----------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ----------------- Custom Configurations -----------------
# Auto-generate transactions at startup or scheduling
fintrack.recurring.scheduler.enabled=true

# ----------------- Spring Mail Settings (Dev SMTP Sandbox / Console Logging Fallback) -----------------
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=change-me
spring.mail.password=change-me
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=2000
spring.mail.properties.mail.smtp.writetimeout=3000
